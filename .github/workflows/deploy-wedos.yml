name: Deploy na Wedos (FTP)

# Nasadí statický web na Wedos hosting přes FTP.
# POZOR: spouští se POUZE ručně (workflow_dispatch), aby to neselhávalo a
# nespamovalo maily, dokud nejsou nastavené FTP secrets. Po nastavení secrets
# se spustí ručně: Actions → "Deploy na Wedos (FTP)" → Run workflow.
# Vyžaduje 3 GitHub secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# A volitelnou proměnnou FTP_SERVER_DIR (default /www/).

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nahrát na Wedos přes FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: ${{ vars.FTP_SERVER_DIR || '/www/' }}
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            _import/**
            _zaloha/**
            _zdroje/**
            Logo-rebrand/**
            scripts/**
            akademie/_pdf/**
            akademie/_supabase/**
            akademie/_videokurz/**
            **/*.md
            CNAME
            .nojekyll

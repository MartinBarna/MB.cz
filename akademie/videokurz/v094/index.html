<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloncka se ptá Coache - Rychlé hubnutí před dovolenou — Videokurz · Martin Barna</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="stylesheet" href="/assets/vendor/fonts/poppins.css">
<link rel="stylesheet" href="/assets/ba-ui.css">
<style>
  .wrap { max-width:880px; margin:0 auto; padding:30px 18px 80px; }
  .crumb { color:var(--gold-soft); font-size:.74rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; }
  h1 { font-size:clamp(1.5rem,3.5vw,2rem); line-height:1.2; color:#fff; margin:.5rem 0 1.3rem; letter-spacing:-.02em; }
  .video { position:relative; padding-top:56.25%; background:#000; border-radius:18px; overflow:hidden; border:1px solid var(--line); box-shadow:0 30px 60px -30px rgba(0,0,0,.9); }
  .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .vlock { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted-2); }
  .vlock-ico { font-size:2rem; opacity:.8; }
  .vlock p { font-size:.92rem; margin:0; }
  .done-row { margin-top:1.7rem; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .autop { display:flex; align-items:center; gap:8px; color:var(--muted-2); font-size:.88rem; cursor:pointer; user-select:none; }
  .autop input { accent-color:var(--gold); width:17px; height:17px; cursor:pointer; }
  .btn { background:linear-gradient(145deg,var(--gold-2),var(--gold)); color:#160d04; font-weight:700; padding:13px 24px; border-radius:50px; border:none; cursor:pointer; text-decoration:none; display:inline-block; font-family:inherit; font-size:.95rem; box-shadow:0 12px 26px -8px rgba(255,122,0,.55); transition:transform .2s; }
  .btn:hover { transform:translateY(-2px); }
  .btn.ghost { background:rgba(255,255,255,.05); border:1px solid var(--line-2); color:var(--muted-2); box-shadow:none; }
  .btn.ghost:hover { border-color:rgba(255,122,0,.4); color:#fff; transform:none; }
  .btn.is-done { background:linear-gradient(145deg,#2fae57,#1f9647); color:#fff; box-shadow:0 12px 26px -8px rgba(47,174,87,.5); }
  .nav { margin-top:1.5rem; display:flex; justify-content:space-between; gap:10px; }
  .foot { margin-top:2rem; font-size:.8rem; color:var(--muted); }
  .upsell { display:block; margin-top:1.6rem; text-decoration:none; background:linear-gradient(135deg,rgba(255,122,0,.18),rgba(255,122,0,.05)); border:1px solid rgba(255,122,0,.4); border-radius:16px; padding:16px 20px; color:var(--muted-2); font-size:.95rem; line-height:1.55; transition:transform .2s,border-color .2s; }
  .upsell:hover { transform:translateY(-2px); border-color:rgba(255,122,0,.7); }
  .upsell b { color:#fff; }
  .upsell .go2 { display:block; margin-top:8px; color:var(--gold-soft); font-weight:700; }
</style>
</head>
<body class="ba">
  <div class="top"><div class="in">
    <a class="brand" href="/akademie/videokurz/"><span class="mark">MB</span><span><b>Videokurz</b><span class="tag">Barna Academy</span></span></a>
    <a class="back" href="/akademie/moje/">← Zpět na Academy</a>
  </div></div>

  <div class="wrap">
    <div class="crumb">Bloncka se ptá Coache · Video 94 / 182</div>
    <h1>Bloncka se ptá Coache - Rychlé hubnutí před dovolenou</h1>

    <div class="video" id="vidbox"><div class="vlock"><span class="vlock-ico">🔒</span><p>Video se načítá po ověření přístupu…</p></div></div>

    <div class="done-row">
      <button class="btn" id="doneBtn">Označit jako zhlédnuté ✓</button>
      <a class="btn ghost" href="/akademie/videokurz/">Zpět na přehled</a>
      <label class="autop" title="Po dohrání videa se automaticky pustí další lekce — ideální na poslech se sluchátky."><input type="checkbox" id="autoNext" checked> Po dohrání pustit další lekci ▶</label>
    </div>

    <div class="nav"><a class="btn ghost" href="/akademie/videokurz/v093/">← Předchozí</a><a class="btn ghost" href="/akademie/videokurz/v095/">Další →</a></div>

    

    <p class="foot">© Videokurz Martin Barna. Video je dostupné jen přihlášeným s aktivním přístupem.</p>
  </div>

  <script src="/assets/ba-config.js"></script>
  <script src="/assets/ba-academy.js?v=20260702c"></script>
  <script src="/assets/academy-upsell.js" defer></script>
  <script src="/assets/scroll-top.js" defer></script>
  <script>
    var LID='vk-v094', SLUG='v094', PRODUCT='videokurz', FREE=false, GUEST=false, state={done:false};
    var TOTAL=182, BUY='https://form.simpleshop.cz/3Vbl/buy/';
    var player=null, chain=null, prog={};

    // --- YouTube IFrame API (kvůli detekci konce videa -> autoplay další lekce) ---
    function ytApi(cb){
      if (window.YT && window.YT.Player) return cb();
      window._ytcbs = window._ytcbs || []; window._ytcbs.push(cb);
      if (!window._ytreq){
        window._ytreq = 1;
        window.onYouTubeIframeAPIReady = function(){ (window._ytcbs||[]).forEach(function(f){ try{ f(); }catch(e){} }); };
        var s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s);
      }
    }
    function attachFree(){ ytApi(function(){ if(!player && document.getElementById('ytframe')) player=new YT.Player('ytframe',{events:{onStateChange:onState}}); }); }
    // Placené video: YouTube ID není v HTML — načte se z DB manifestu až po ověření přístupu (RLS).
    function mountVideo(){
      if (FREE || !window.BA || typeof window.BA.getVideoId !== 'function') return;
      window.BA.getVideoId(SLUG).then(function(id){
        if (!id) return;
        var box = document.getElementById('vidbox'); if (!box) return;
        box.innerHTML = '<div id="ytp"></div>';
        ytApi(function(){
          player = new YT.Player('ytp', {
            host: 'https://www.youtube-nocookie.com', videoId: id,
            playerVars: { rel:0, modestbranding:1 },
            events: { onStateChange: onState }
          });
        });
      });
    }

    // --- autoplay řetěz: konec videa -> označ zhlédnuté -> pusť další lekci v témže přehrávači
    // (bez načtení stránky, takže mobil nezablokuje zvuk — funguje i se sluchátky v kapse) ---
    function onState(e){
      if (e.data !== 0) return;   // 0 = ENDED
      markDone(true);
      var chk=document.getElementById('autoNext');
      if (chk && chk.checked) nextLesson();
    }
    function loadChain(cb){
      if (chain) return cb(chain);
      fetch('/akademie/videokurz/chain.json').then(function(r){ return r.json(); })
        .then(function(j){ chain=j; cb(j); }).catch(function(){});
    }
    function nextLesson(){
      loadChain(function(ch){
        var i=-1; for(var k=0;k<ch.length;k++){ if(ch[k].s===SLUG){ i=k; break; } }
        var nx = i>=0 ? ch[i+1] : null;
        if (!nx){ endNote('🎉 Gratuluji — dojel[a] jsi na konec kurzu!'); return; }
        if (GUEST && !nx.f){ upsellOverlay(); return; }
        window.BA.getVideoId(nx.s).then(function(id){
          if (!id){ if(!nx.f) upsellOverlay(); return; }
          swapTo(nx, id, i+1);
        });
      });
    }
    function swapTo(nx, id, idx){
      SLUG = nx.s; LID = 'vk-' + nx.s;
      state.done = !!prog[LID]; paint();
      var h=document.querySelector('h1'); if(h) h.textContent=nx.t;
      document.title = nx.t + ' — Videokurz · Martin Barna';
      var cr=document.querySelector('.crumb'); if(cr) cr.textContent='Video ' + (idx+1) + ' / ' + TOTAL;
      try{ history.replaceState(null, '', '/akademie/videokurz/' + nx.s + '/'); }catch(e){}
      var nav=document.querySelector('.nav');
      if (nav){
        var p=chain[idx-1], n=chain[idx+1];
        nav.innerHTML=(p?'<a class="btn ghost" href="/akademie/videokurz/'+p.s+'/">← Předchozí</a>':'<span></span>')
          +(n?'<a class="btn ghost" href="/akademie/videokurz/'+n.s+'/">Další →</a>':'<span></span>');
      }
      player.loadVideoById(id);
      try{ window.scrollTo({top:0, behavior:'smooth'}); }catch(e){}
    }
    function overlayBox(html){
      var box=document.getElementById('vidbox'); if(!box) return;
      var d=document.createElement('div'); d.className='vlock'; d.style.background='rgba(0,0,0,.85)'; d.style.zIndex='3';
      d.innerHTML=html; box.appendChild(d);
    }
    function upsellOverlay(){ overlayBox('<span class="vlock-ico">🔓</span><p><strong>Další lekce jsou v plném kurzu.</strong></p><p><a href="'+BUY+'" style="color:#ffb066;font-weight:700;">Odemknout všech '+TOTAL+' lekcí →</a></p>'); }
    function endNote(t){ overlayBox('<span class="vlock-ico">🏆</span><p><strong>'+t+'</strong></p><p><a href="/akademie/videokurz/" style="color:#ffb066;font-weight:700;">Zpět na přehled →</a></p>'); }

    var btn=document.getElementById('doneBtn');
    function paint(){ if(state.done){ btn.classList.add('is-done'); btn.textContent='Zhlédnuto ✓ (klikni pro zrušení)'; } else { btn.classList.remove('is-done'); btn.textContent='Označit jako zhlédnuté ✓'; } }
    function lsDone(){ try{ return !!JSON.parse(localStorage.getItem('ba_progress_v1')||'{}')[LID]; }catch(e){ return false; } }
    function lsSet(d){ try{ var o=JSON.parse(localStorage.getItem('ba_progress_v1')||'{}'); if(d) o[LID]=true; else delete o[LID]; localStorage.setItem('ba_progress_v1', JSON.stringify(o)); }catch(e){} }
    function markDone(d){
      if (state.done === d) return;
      state.done = d; paint(); prog[LID] = d;
      if (GUEST){ lsSet(d); } else if (window.BA){ window.BA.setDone(PRODUCT, LID, d); } else { lsSet(d); }
    }
    // volba autoplay si pamatuje zařízení (výchozí: zapnuto)
    (function(){
      var AK='ba_autoplay_v1', chk=document.getElementById('autoNext');
      try{ chk.checked = localStorage.getItem(AK) !== '0'; }catch(e){}
      chk.addEventListener('change', function(){ try{ localStorage.setItem(AK, chk.checked ? '1' : '0'); }catch(e){} });
    })();
    function load(){
      if (window.BA){
        window.BA.ready.then(function(){
          if (window.BA.mode==='live'){
            if (FREE) {
              // Ochutnávka zdarma: lekce je veřejná, hrá i bez přihlášení (žádný redirect-loop).
              attachFree();
              window.BA.getUser().then(function(u){
                if(!u){ GUEST=true; state.done=lsDone(); paint(); return; }
                window.BA.getProgress().then(function(d){ prog=d; state.done=!!d[LID]; paint(); });
              });
            }
            else { window.BA.requireAccess(PRODUCT).then(function(ok){ if(!ok) return; mountVideo(); window.BA.getProgress().then(function(d){ prog=d; state.done=!!d[LID]; paint(); }); }); }
          }
          else { if (FREE) attachFree(); window.BA.getProgress().then(function(d){ prog=d; state.done=!!d[LID]; paint(); }); }
        });
      } else { if (FREE) attachFree(); state.done=lsDone(); paint(); }
    }
    btn.addEventListener('click', function(){ markDone(!state.done); });
    load();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Přihlášení — Barna Academy</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23161616'/><text x='50' y='70' font-size='54' font-family='Arial' font-weight='bold' fill='%23ff7a00' text-anchor='middle'>MB</text></svg>">
<link rel="stylesheet" href="/assets/vendor/fonts/poppins.css">
<style>
  :root { --gold:#ff7a00; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',Arial,sans-serif; color:#161616; background:linear-gradient(135deg,#262626,#0d0d0d); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; border-radius:24px; box-shadow:0 24px 70px rgba(0,0,0,.3); max-width:420px; width:100%; padding:38px 32px; text-align:center; }
  .logo { display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:1.4rem; }
  .logo .mark { width:36px; height:36px; border-radius:9px; background:#161616; color:var(--gold); font-weight:800; display:flex; align-items:center; justify-content:center; }
  .logo b { font-size:1.05rem; letter-spacing:.5px; }
  h1 { font-size:1.35rem; margin-bottom:.3rem; }
  p.sub { color:#888; font-size:.92rem; margin-bottom:1.4rem; }
  label { display:block; text-align:left; font-size:.85rem; font-weight:600; margin:.7rem 0 .3rem; color:#555; }
  input { width:100%; border:1.5px solid #e0d8cd; border-radius:12px; padding:12px 16px; font-size:1rem; font-family:inherit; outline:none; }
  input:focus { border-color:var(--gold); }
  .btn { width:100%; background:var(--gold); color:#161616; border:none; font-weight:700; padding:13px; border-radius:50px; cursor:pointer; font-size:1rem; margin-top:1.2rem; }
  .btn:hover { background:#161616; color:#fff; }
  .alt { margin-top:1rem; font-size:.88rem; color:#888; }
  .alt a { color:var(--gold); font-weight:600; text-decoration:none; }
  .note { margin-top:1.4rem; font-size:.78rem; color:#aaa; background:#faf7f2; border-radius:10px; padding:.7rem; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="mark">MB</span><b>BARNA ACADEMY</b></div>
    <h1>Přihlášení do studia</h1>
    <p class="sub">Vítej zpátky. Pokračuj ve svém vzdělávání.</p>
    <form onsubmit="event.preventDefault(); location.href='/akademie/studium/';">
      <label for="em">E-mail</label>
      <input id="em" type="email" placeholder="tvuj@email.cz" autocomplete="email">
      <label for="pw">Heslo</label>
      <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn" type="submit">Přihlásit se</button>
    </form>
    <p class="alt">Ještě nemáš přístup? <a href="/akademie/">Získej Barna Academy →</a></p>
    <div class="note">Ukázka přihlášení. Skutečné přihlašování a placený přístup napojíme přes Supabase. Tlačítko teď vede rovnou do ukázky studia.</div>
  </div>
</body>
</html>

    <style>
        body { font-family:'Poppins',Arial,sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;

        p { font-size:1.2rem; opacity:.95; max-width:480px; margin:1rem auto 2rem; }
        .btn-main { background:#fff; color:#161616; font-weight:700; padding:14px 38px; border-radius:50px; text-decoration:none; display:inline-block; transition:.2s; }

        .links a:hover { opacity:1; border-color:#fff; }
        a:focus-visible { outline:3px solid #fff; outline-offset:3px; border-radius:4px; }
    
        /* ===== přístupnost: respektuj vypnuté animace ===== */
        @media (prefers-reduced-motion: reduce){
            *, *::before, *::after { animation-duration:.001ms!important; animation-iteration-count:1!important; transition-duration:.001ms!important; scroll-behavior:auto!important; }
        }
    </style>
